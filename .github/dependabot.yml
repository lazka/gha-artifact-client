version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 4
    groups:
      uv-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/node-wrapper"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 4
    groups:
      npm-dependencies:
        patterns:
          - "*"